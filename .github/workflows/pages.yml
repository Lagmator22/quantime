# =====================================================================
# GitHub Pages - publishes frontend/ on every push to master.
# ---------------------------------------------------------------------
# After this runs once, enable Pages in repo settings:
#   Settings → Pages → Source: GitHub Actions
# Site will be live at:  https://<user>.github.io/iicpc-platform/
#
# What the published site is: the localStorage prototype. No backend,
# no real Docker sandbox - but the UI is fully functional, the
# in-browser correctness suite runs, and the leaderboard / runs pages
# work against the in-browser matching engine. Good enough for judges
# to click through without spinning anything up.
#
# For the full distributed stack, see Codespaces (.devcontainer/) or
# the DigitalOcean droplet script (deploy/digitalocean/).
# =====================================================================
name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage frontend for Pages
        run: |
          # Pages publishes whatever is in ./site
          mkdir -p site
          cp -R frontend/. site/
          # Add a redirect so /iicpc-platform/ → /iicpc-platform/index.html
          # (already handled by file_server, but harmless)
          ls -la site/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - id: deploy
        uses: actions/deploy-pages@v4
