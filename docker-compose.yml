# =====================================================================
# IICPC PLATFORM · LOCAL ORCHESTRATION
# ---------------------------------------------------------------------
# One command brings the entire distributed system up:
#
#     docker compose up --build
#
# Service map (default ports - override via .env):
#   caddy        :8080        - fronts UI + reverses /api/* + /ws to gateway
#   gateway      :7070        - HTTP+WebSocket API, runs Docker-out-of-Docker
#                               to spawn developer containers
#   botfleet     internal     - goroutine bot pool, scale with --scale botfleet=N
#   telemetry    internal     - NATS subscriber, writes hypertable
#   timescale    :5432        - TimescaleDB (Postgres extension)
#   redis        :6379        - leaderboard + run state hot cache
#   nats         :4222        - order/event bus
#   sample-eng   :9001        - example submission (judges can swap their own)
#
# Network: every service joins `iicpc-net`. The gateway also mounts the
# host's Docker socket so it can `docker run` developer submissions in
# sibling containers (NOT nested - much faster, real isolation).
#
# Volumes:
#   tsdb-data    - TimescaleDB persistence
#   redis-data   - Redis snapshots
#   submissions  - uploaded code + binaries (gateway writes, sandbox reads)
# =====================================================================

services:

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_PORT:-8080}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv:ro
    depends_on:
      - gateway
    networks: [iicpc-net]

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://iicpc:iicpc@timescale:5432/iicpc?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - SUBMISSIONS_DIR=/data/submissions
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - submissions:/data/submissions
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      timescale:  { condition: service_healthy }
      redis:      { condition: service_started }
      nats:       { condition: service_started }
    networks:
      - iicpc-net
      - iicpc-sandbox-net
    expose: ["7070"]

  botfleet:
    build:
      context: ./services/botfleet
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NATS_URL=nats://nats:4222
      - GATEWAY_URL=http://gateway:7070
      - BOTS_PER_INSTANCE=${BOTS_PER_INSTANCE:-50}
      - REDIS_URL=redis://redis:6379
    depends_on:
      nats: { condition: service_started }
      redis: { condition: service_started }
    networks:
      - iicpc-net
      - iicpc-sandbox-net
    # Scale horizontally: docker compose up --scale botfleet=4

  telemetry:
    build:
      context: ./services/telemetry
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://iicpc:iicpc@timescale:5432/iicpc?sslmode=disable
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379
    depends_on:
      timescale: { condition: service_healthy }
      nats:      { condition: service_started }
      redis:     { condition: service_started }
    networks: [iicpc-net]

  # AI services are OPT-IN so the core stack always comes up for anyone:
  #   docker compose up                          -> core platform only
  #   docker compose --profile ai up             -> + cloud AI analyzer
  #                                                 (bring your own Gemini/
  #                                                  OpenAI/Claude key in the UI)
  #   docker compose --profile ai --profile ai-local up
  #                                              -> also runs a self-hosted
  #                                                 OpenVINO LLM (needs a local
  #                                                 model dir; amd64/Rosetta).
  # The cloud analyzer does NOT require local-llm, so `--profile ai` builds
  # cleanly on any machine without the OpenVINO model mount.
  ai-analyzer:
    profiles: ["ai"]
    build:
      context: ./services/ai-analyzer
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - AI_MODEL=${AI_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LOCAL_LLM_URL=http://local-llm:8000/v1/chat/completions
      - PORT=7080
    expose: ["7080"]
    networks: [iicpc-net]

  # Optional self-hosted LLM for air-gapped / private analysis. Separate
  # profile so it never blocks the cloud analyzer build on machines without
  # an OpenVINO model or arm64 wheel support.
  local-llm:
    profiles: ["ai-local"]
    platform: linux/amd64
    build:
      context: ./services/ai-analyzer/local_llm
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MODEL_PATH=/models/Llama-3.2-3B-Instruct-INT4
    volumes:
      # Override with your own OpenVINO model dir:
      #   LLM_MODEL_DIR=/path docker compose --profile ai --profile ai-local up
      - ${LLM_MODEL_DIR:-/Users/lagmator22/OpenvinoDemo/OvaSearch/models}:/models:ro
    expose: ["8000"]
    networks: [iicpc-net]

  timescale:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    environment:
      - POSTGRES_USER=iicpc
      - POSTGRES_PASSWORD=iicpc
      - POSTGRES_DB=iicpc
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${TSDB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "iicpc"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [iicpc-net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [iicpc-net]

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MON_PORT:-8222}:8222"
    networks: [iicpc-net]

  # Example developer submission. Judges swap this out by submitting
  # their own image - the sandbox service builds + runs uploads as
  # sibling containers under the same network policy.
  sample-engine:
    build:
      context: ./examples/sample-engine-go
    ports:
      - "9001:9001"
    restart: unless-stopped
    networks: [iicpc-sandbox-net]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  sample-engine-cpp:
    build:
      context: ./examples/sample-engine-cpp
    ports:
      - "9002:9002"
    restart: unless-stopped
    networks: [iicpc-sandbox-net]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  sample-engine-python:
    build:
      context: ./examples/sample-engine-python
    ports:
      - "9003:9003"
    restart: unless-stopped
    networks: [iicpc-sandbox-net]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  sample-engine-real-world:
    build:
      context: ./examples/real-world-orderbook
    ports:
      - "9004:9004"
    restart: unless-stopped
    networks: [iicpc-sandbox-net]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # Liquibook — Object Computing's canonical open-source C++ matching engine.
  sample-engine-liquibook:
    build:
      context: ./examples/sample-engine-liquibook
    ports:
      - "9005:9005"
    restart: unless-stopped
    networks: [iicpc-sandbox-net]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

volumes:
  tsdb-data:
  redis-data:
  submissions:

networks:
  iicpc-net:
    name: iicpc-net
    driver: bridge

  iicpc-sandbox-net:
    name: iicpc-sandbox-net
    driver: bridge
