#cloud-config
# =====================================================================
# Boots the platform on first start. Idempotent — re-running the
# template re-clones and recreates the compose stack.
# =====================================================================
package_update: true
packages:
  - docker
  - git

runcmd:
  - systemctl enable --now docker
  - usermod -aG docker ec2-user
  # Install docker compose plugin
  - mkdir -p /usr/local/lib/docker/cli-plugins
  - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" -o /usr/local/lib/docker/cli-plugins/docker-compose
  - chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
  # Clone + boot
  - cd /opt && git clone ${repo_url} iicpc
  - cd /opt/iicpc && docker compose up -d --build
  # Self-heal at boot
  - echo '@reboot root cd /opt/iicpc && docker compose up -d' > /etc/cron.d/iicpc-boot
